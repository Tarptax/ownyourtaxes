    <style>

            text-align: center;
            line-height: 1.6;
            background-color: #050505;

        }
        
h2, h3 {
    color: #C9A24A;
}

h2 {

}

.contact-email {

}

.contact-email:hover {
    color: #C9A24A;

}

.author-banner {

}

.author-banner img {

    max-width: 100vw;

    display: block;

a {

}
        
.banner {

}

.banner img {
    width: 100%;
    max-width: 100vw;
    height: auto;
    display: block;
    margin: 0 auto;
}

        
        .books {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .book {
            width: 300px;
        }

        .book img {
            height: 450px;
            width: auto%;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,.2);

        .button {

            padding: 10px 20px;

            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;

        }

        hr {

            height: 1px;

            margin: 50px 0;
        }

        @media (max-width: 768px) {

            body {

            }

            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            .books {
                gap: 30px;
            }

            .book {
                width: 100%;
                max-width: 320px;
                margin: 0 auto;
            }

          

            .button {
                display: block;
                width: 100%;
                box-sizing: border-box;
                padding: 14px;
            }
            
           .banner img,
               .author-banner img {
               width: 100vw;
               max-width: 100vw;
           }

    .banner,
    .author-banner {

        margin-left: calc(50% - 50vw);
