
<head>
    <title>Own Your Taxes</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: auto;
            padding: 30px;
            text-align: center;
            line-height: 1.6;
        }

        .books {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .book {
            width: 300px;
        }

        .book img {
            width: 100%;
            max-width: 280px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,.2);
        }

        .button {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #0d3b66;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .button:hover {
            background-color: #14528f;
        }

        hr {
            margin: 50px 0;
        }

        /* MOBILE OPTIMIZATION */

        @media (max-width: 768px) {

            body {
                padding: 15px;
            }

            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            .books {
                gap: 35px;
            }

            .book {
                width: 100%;
                max-width: 320px;
                margin: 0 auto;
            }

            .book img {
                max-width: 100%;
            }

            .button {
                display: block;
                width: 100%;
                box-sizing: border-box;
                padding: 14px;
                font-size: 1rem;
            }
        }
    </style>
</head>
